services:
  postgres:
    image: postgres:16-alpine
    container_name: rotta-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rotta
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - rotta_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d rotta']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  rotta_postgres_data:
